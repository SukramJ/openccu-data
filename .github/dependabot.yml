version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    reviewers:
      - SukramJ
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    reviewers:
      - SukramJ
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore
    groups:
      python-dependencies:
        patterns:
          - "*"
