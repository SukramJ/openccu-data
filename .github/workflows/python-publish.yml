# Publishes openccu-data to PyPI when a GitHub Release is published
# (or when triggered via repository_dispatch from release-on-tag.yml).
#
# Prereqs:
# - PyPI Trusted Publishing is configured for this repository under
#   environment "pypi".
# - The tag matches the version declared in openccu_data/const.py:VERSION.

name: "Release: Publish to PyPI"

# yamllint disable-line rule:truthy
on:
  release:
    types: [published]
  repository_dispatch:
    types: [release-on-tag-succeeded]

permissions:
  contents: read   # build/publish jobs only need read access
  id-token: write  # required for PyPI Trusted Publishing

concurrency:
  group: python-publish-${{ github.event.release.tag_name || github.event.client_payload.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  release-build:
    if: ${{ github.repository_owner == 'SukramJ' }}
    runs-on: ubuntu-latest
    name: Build Distributions (${{ github.event.release.tag_name || github.event.client_payload.tag }})
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.client_payload.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements_test.txt

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
          ls -l dist/

      - name: Upload built distributions as artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    if: ${{ github.repository_owner == 'SukramJ' }}
    runs-on: ubuntu-latest
    name: Publish to PyPI (${{ github.event.release.tag_name || github.event.client_payload.tag }})
    needs: [release-build]
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
    env:
      TAG_NAME: ${{ github.event.release.tag_name || github.event.client_payload.tag }}
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: release-dists
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
