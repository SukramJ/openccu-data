repos:
  - repo: local
    hooks:
      - id: lint-translation-custom
        name: lint-translation-custom
        entry: script/run-in-env.sh python script/lint_translation_custom.py
        language: script
        files: ^openccu_data/data/translation_custom/.+\.json$
        pass_filenames: false
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args:
          - --fix
      - id: ruff-format
        files: ^((openccu_data|script|tests)/.+)?[^/]+\.py$
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --ignore-words-list=ans,hass,offen
          - --skip="./.*,*.csv,*.json,*.json.gz,*.gz"
          - --quiet-level=2
        exclude_types: [csv, json]
        exclude: ^openccu_data/data/|.*\.json\.gz$
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args:
          - --quiet
          - --format=custom
          - --configfile=tests/bandit.yaml
        files: ^(openccu_data|script)/.+\.py$
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^.+\.(md|json|ya?ml)$
        exclude: ^(openccu_data/data/|\.github/)
  - repo: local
    hooks:
      # Run mypy through our wrapper so the venv is activated even when
      # committing from a GUI tool that was not launched from a shell.
      - id: mypy
        name: mypy
        entry: script/run-in-env.sh mypy
        language: script
        types_or: [python, pyi]
        require_serial: true
        files: ^openccu_data/.+\.py$
